    key_symptoms: []
    attention_points:
    - 白细胞和淋巴细胞持续增高
    - 分类以分化较好的CLL细胞为主（常>50%，可达80%-90%）
    - CLL细胞形态类似正常淋巴细胞但核形不规则、呈深切迹或核裂隙，核染色质不规则聚集，胞质量少、灰蓝色多无颗粒
    - 篮状细胞（破碎细胞）多见
    - 幼稚淋巴细胞增多通常<2%，当外周血幼稚淋巴细胞>5%时诊断为B-CLL/幼淋巴细胞白血病
