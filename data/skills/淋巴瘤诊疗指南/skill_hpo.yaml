  - examination: 免疫组化（IHC）
    source_cards:
    - card_id: ocr_card_df4f5f27d457
      recommendation_label: null
    key_symptoms: []
    attention_points:
    - 十二指肠型滤泡性淋巴瘤预后很好，需要与其他胃肠道解剖部位的滤泡性淋巴瘤区分开
    - 伴IRF4基因重排的大B细胞淋巴瘤常发生咽淋巴环和颈部淋巴结，儿童及年轻人多见，组织学与经典高级别滤泡性淋巴瘤一致，IHC显示IRF4阳性、CD10阳性、BCL6阳性，FISH显示有IRF4重排，该类型预后相对较好
    - 原位滤泡性淋巴瘤改为原位滤泡性肿瘤
    - 当瘤细胞累及骨髓时，有核细胞增生可明显活跃，以滤泡性淋巴瘤细胞增多为主，细胞较正常淋巴细胞大，胞核圆形或不规则形，核染色质较细，核仁隐约可见，胞质丰富，呈淡蓝色，部分可见空泡变性
    - 滤泡性淋巴瘤的诊断主要依据病理组织学，当出现滤泡性淋巴瘤白血病时，骨髓或外周血可见一定数量的滤泡性淋巴瘤细胞
