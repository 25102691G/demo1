  - examination: 粪便钙卫蛋白检测
    source_cards:
    - card_id: ocr_card_311b90498cfe
      recommendation_label: null
    - card_id: ocr_card_ad962a428b5a
      recommendation_label: null
    - card_id: ocr_card_c049b9ad9835
      recommendation_label: null
    key_symptoms: []
    attention_points:
    - FC是由中性粒细胞产生的一类钙结合蛋白，其水平反映了中性粒细胞向肠黏膜的迁移情况，是肠道尤其是结肠炎症反应的非特异性指标
    - FC浓度可用于CD与肠易激综合征的鉴别诊断，尤其是儿童患者
    - 阴性的FC结果对排除成人CD有较高的准确性
    - 须注意的是，此处的CD患者主要指通过回结肠镜及上消化道检查确诊者
    - FC浓度与SES-CD、CDAI存在相关性，可作为疾病活动监测的无创指标
    - 回结肠切除术后FC浓度>100 μg/g对疾病复发的预测灵敏度约89%
    - 抗TNF类药物治疗后FC浓度>160 μg/g对疾病复发的预测灵敏度约91.7%
    - FC浓度在50 μg/g以下对小肠炎症的阴性预测值>90%
    - FC浓度升高对疾病活动有一定提示作用
    - 需谨慎解读FC的阴性结果，尤其对于小肠受累的CD患者
