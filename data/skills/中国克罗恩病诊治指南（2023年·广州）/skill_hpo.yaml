    key_symptoms: []
    attention_points:
    - 结肠镜检查应尽量进入回肠末段
    - 疑诊患者应进行多肠段活体组织检查
    - CD的内镜下表现包括溃疡、黏膜红斑、糜烂、水肿、肠腔狭窄、息肉样增生、瘘管等
    - 早期CD的肠道溃疡多为阿弗他样溃疡，随病变进展而逐渐变大变深、融合形成纵行溃疡，旁边黏膜可形成铺路石样改变
    - 倾向于CD诊断的内镜下表现包括非连续性病变、狭窄或瘘管、肛周病变
    - 出现纵行溃疡及铺路石样改变时须高度怀疑CD
    - 充分排除缺血性肠病、UC等疾病
    - 广泛、深大溃疡
    - 应从多个结肠段进行多部位肠黏膜活检
    - 特别是对炎症部位溃疡边缘进行活检
    - 评估组织学疾病活动度和受累范围
    - 有助于不典型增生的检出
    - 指导未来的监测间隔
    - 建议在疾病缓解期进行肿瘤筛查，以减少炎症对肿瘤筛查的影响
