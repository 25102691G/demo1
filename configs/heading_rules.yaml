# 医学指南标题分段规则。
#
# 本文件供 HeadingSegmenter 在处理叙述性指南时使用，用于识别清洗后的
# PDF/TXT/MD 文本中的章节标题，并通过 rank 表示标题层级。抽取流程会先根据
# 这些标题构建章节路径，再将正文切分为 clinical_info_unit 记录。
heading_patterns:
  - name: chinese_section
    rank: 10
    patterns:
      - "^[一二三四五六七八九十百]+(?:[、．.]|\\s+).+$"

  - name: arabic_section
    rank: 10
    patterns:
      - "^\\d+(?!\\.\\d)(?:[、．.]|\\s+).+$"

  - name: roman_heading
    rank: 20
    patterns:
      - "^[IVXLCDM]+\\s+.+$"

  - name: roman_decimal_heading
    rank: 30
    patterns:
      - "^[IVXLCDM]+(?:\\.\\d+)+\\s+.+$"

  - name: arabic_decimal_heading
    rank: 30
    patterns:
      - "^\\d+(?:\\.\\d+)+\\s+.+$"

  - name: chinese_parentheses
    rank: 40
    patterns:
      - "^[（(][一二三四五六七八九十百]+[）)].+$"

  - name: uppercase_parentheses
    rank: 40
    patterns:
      - "^[（(][A-Z][）)].+$"

  - name: lowercase_parentheses
    rank: 50
    patterns:
      - "^[（(][a-z][）)].+$"

  - name: circled_number
    rank: 60
    patterns:
      - "^[①②③④⑤⑥⑦⑧⑨⑩].+$"

  - name: bracket_number
    rank: 60
    patterns:
      - "^\\[\\d+\\].+$"
