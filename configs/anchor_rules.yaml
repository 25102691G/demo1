# 医学指南锚点匹配规则。
#
# 本文件供 guideline_skill.AnchorRegistry 使用，用于对清洗后的指南文本进行分类，
# 并在文本中定位结构化推荐单元。patterns 中的规则是正则表达式，会匹配归一化后的
# PDF 文本。
#
# classification 用于控制何时将文档判定为结构化指南。
classification:
  structured_threshold: 15
  min_unit_anchor_count: 2

# unit_anchors 定义顶层推荐单元锚点，例如“推荐意见 1:”或“共识意见 2:”。
# 结构化抽取流程会使用主推荐单元锚点将文档切分为 recommendation_card 记录。
unit_anchors:
  - name: recommendation
    label: 推荐意见
    patterns:
      - "推荐意见\\s*[a-zA-Z]?\\d+(\\.\\d+)?[a-zA-Z]?[:：]"
    weight: 5
    statement_type: recommendation

  - name: consensus
    label: 共识意见
    patterns:
      - "共识意见\\s*\\d+(\\.\\d+)?[:：]"
    weight: 5
    statement_type: consensus

  - name: statement
    label: 陈述
    patterns:
      - "陈述\\s*\\d+(\\.\\d+)?[:：]"
      - "声明\\s*\\d+(\\.\\d+)?[:：]"
    weight: 5
    statement_type: statement

  - name: english_recommendation
    label: Recommendation
    patterns:
      - "Recommendation\\s*\\d+(\\.\\d+)?[:：]"
    weight: 5
    statement_type: recommendation

# field_anchors 定义每个推荐片段内部的字段级锚点。
# StatementExtractor 会根据这些锚点识别临床问题、证据等级、推荐强度、
# 实施建议和推荐理由等字段。
field_anchors:
  - name: clinical_question
    label: 临床问题
    patterns:
      - "临床问题\\s*\\d+(\\.\\d+)?[:：]"
    weight: 2
    field: clinical_question

  - name: evidence_quality
    label: 证据等级
    patterns:
      - "证据等级[:：]"
      - "GRADE\\s*证据分级[:：]"
      - "证据质量[:：]"
    weight: 3
    field: evidence_quality_raw

  - name: strength
    label: 推荐强度
    patterns:
      - "推荐强度[:：]"
      - "强推荐"
      - "弱推荐"
    weight: 3
    field: strength_raw

  - name: recommendation_level
    label: 推荐级别
    patterns:
      - "推荐级别[:：]"
    weight: 3
    field: consensus_level

  - name: bps
    label: BPS
    patterns:
      - "BPS"
      - "最佳临床实践"
    weight: 2
    field: strength_raw

  - name: implementation_advice
    label: 实施建议
    patterns:
      - "实施建议[:：]"
    weight: 2
    field: implementation_advice

  - name: rationale
    label: 推荐理由
    patterns:
      - "推荐理由[:：]"
    weight: 2
    field: rationale
