classification:
  structured_threshold: 15
  min_unit_anchor_count: 2

unit_anchors:
  - name: recommendation
    label: 推荐意见
    patterns:
      - "推荐意见\\s*\\d+(\\.\\d+)?[:：]"
    weight: 5
    statement_type: recommendation

  - name: consensus
    label: 共识意见
    patterns:
      - "共识意见\\s*\\d+(\\.\\d+)?[:：]"
    weight: 5
    statement_type: consensus

  - name: statement
    label: 陈述
    patterns:
      - "陈述\\s*\\d+(\\.\\d+)?[:：]"
      - "声明\\s*\\d+(\\.\\d+)?[:：]"
    weight: 4
    statement_type: statement

  - name: english_recommendation
    label: Recommendation
    patterns:
      - "Recommendation\\s*\\d+(\\.\\d+)?[:：]"
    weight: 5
    statement_type: recommendation

field_anchors:
  - name: clinical_question
    label: 临床问题
    patterns:
      - "临床问题\\s*\\d+(\\.\\d+)?[:：]"
    weight: 2
    field: clinical_question

  - name: evidence_quality
    label: 证据等级
    patterns:
      - "证据等级[:：]"
      - "GRADE\\s*证据分级[:：]"
      - "证据质量[:：]"
    weight: 3
    field: evidence_quality_raw

  - name: strength
    label: 推荐强度
    patterns:
      - "推荐强度[:：]"
      - "强推荐"
      - "弱推荐"
    weight: 3
    field: strength_raw

  - name: recommendation_level
    label: 推荐级别
    patterns:
      - "推荐级别[:：]"
    weight: 3
    field: consensus_level

  - name: bps
    label: BPS
    patterns:
      - "BPS"
      - "最佳临床实践"
    weight: 2
    field: strength_raw

  - name: implementation_advice
    label: 实施建议
    patterns:
      - "实施建议[:：]"
    weight: 2
    field: implementation_advice

  - name: rationale
    label: 推荐理由
    patterns:
      - "推荐理由[:：]"
    weight: 2
    field: rationale
